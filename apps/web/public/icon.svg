<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="q-ching">
  <rect width="512" height="512" rx="96" fill="#11100e" />
  <!-- ䷀ Qian / ䷁ Kun motif: three lines, the topmost broken — a quiet hexagram fragment -->
  <g stroke="#efe9dd" stroke-width="26" stroke-linecap="round">
    <line x1="148" y1="196" x2="364" y2="196" />
    <line x1="148" y1="256" x2="364" y2="256" />
    <line x1="148" y1="316" x2="232" y2="316" />
    <line x1="280" y1="316" x2="364" y2="316" />
  </g>
  <!-- cinnabar changing-line mark -->
  <circle cx="256" cy="316" r="13" fill="#b34733" />
</svg>
