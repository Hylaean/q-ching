name: Release

# On every push to main, Changesets does one of two things:
#   - If there are pending changeset files, it opens/updates a "Version Packages"
#     PR that bumps versions and updates changelogs. Merging that PR triggers...
#   - ...a publish: any public package whose version isn't yet on the registry is
#     published to npm (in dependency order: core → tui/mcp).
#
# Auth: trusted publishing (OIDC) — no npm token. GitHub mints a short-lived
# OIDC token (that's what `id-token: write` is for); npm verifies it against the
# trusted publisher configured on each package's npmjs.com Settings page (owner
# `Hylaean`, repo `q-ching`, workflow `release.yml`) and allows the publish with
# no 2FA one-time password. Provenance attestations are generated automatically.
# This needs npm >= 11.5.1, so we upgrade npm after setup-node (Node 20 still
# ships npm 10). GITHUB_TOKEN is the built-in token used to open the PR / push tags.
#
# BOOTSTRAP (one-time, per package): npm can only attach a trusted publisher to a
# package that already exists, so the first-ever publish of each @q-ching/* package
# must be done by hand (`npm publish`, entering an OTP). After that, configure the
# trusted publisher on npmjs.com and every subsequent release flows through here.

on:
  push:
    branches: [main]

# One release at a time.
concurrency: release-${{ github.ref }}

permissions:
  contents: write # push the version commit + git tags
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # mint the OIDC token npm trusted publishing verifies

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Changesets diffs against baseBranch, so it needs full history

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 20 bundles npm 10.
      - run: npm install -g npm@latest

      # The rollup native binary is pinned as an optionalDependency so npm ci
      # installs it here despite npm's cross-OS optional-deps bug (npm/cli#4828).
      - run: npm ci

      # Build the engine first — tui and mcp resolve @q-ching/core from its dist/.
      - run: npm run build:core

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
